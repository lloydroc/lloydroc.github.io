{{ if or .Page.Params.math .Site.Params.math }}
<!-- adds MathJax support -->
<script type="text/x-mathjax-config">
    MathJax.Hub.Config({
        extensions: ["tex2jax.js"],
        jax: ["input/TeX", "output/HTML-CSS"],
        tex2jax: {
            inlineMath: [ ['$','$'], ["\\(","\\)"] ],
            displayMath: [ ['$$','$$'], ["\\[","\\]"] ],
            processEscapes: true
        },
        "HTML-CSS": { availableFonts: ["TeX"] }
    });
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{{ end }}
{{ if hugo.IsProduction }}
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-125892300-1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'UA-125892300-1');
</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1871958735356133"
     crossorigin="anonymous"></script>
{{ end }}
<style>
  :root {
    color-scheme: dark;
    --bg: #08111f;
    --surface: #0f172a;
    --surface-2: #121c2e;
    --text: #f3f6fb;
    --muted: #9db0c4;
    --border: #243244;
    --accent: #7dd3fc;
    --accent-strong: #38bdf8;
    --link: #7dd3fc;
    --link-hover: #a7f3d0;
  }

  html, body {
    background: var(--bg) !important;
    color: var(--text) !important;
  }

  body {
    line-height: 1.65;
  }

  a, a:visited {
    color: var(--link) !important;
  }

  a:hover, a:focus {
    color: var(--link-hover) !important;
  }

  body, p, li, dt, dd, figcaption, table, th, td {
    color: var(--text) !important;
  }

  blockquote {
    background: rgba(125, 211, 252, 0.08) !important;
    border-left: 0.35rem solid rgba(125, 211, 252, 0.4) !important;
    color: var(--muted) !important;
  }

  pre, code, .highlight, .chroma, .highlight pre, .chroma pre, code[class*="language-"], pre[class*="language-"] {
    background: var(--surface-2) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
  }

  ::selection {
    background: rgba(125, 211, 252, 0.35) !important;
    color: #ffffff !important;
  }

  img, svg, video {
    filter: none !important;
  }
</style>
