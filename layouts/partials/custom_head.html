{{ if or .Page.Params.math .Site.Params.math }}
<!-- adds MathJax support -->
<script type="text/x-mathjax-config">
    MathJax.Hub.Config({
        extensions: ["tex2jax.js"],
        jax: ["input/TeX", "output/HTML-CSS"],
        tex2jax: {
            inlineMath: [ ['$','$'], ["\\(","\\)"] ],
            displayMath: [ ['$$','$$'], ["\\[","\\]"] ],
            processEscapes: true
        },
        "HTML-CSS": { availableFonts: ["TeX"] }
    });
</script>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
{{ end }}
{{ if hugo.IsProduction }}
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-125892300-1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'UA-125892300-1');
</script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1871958735356133"
     crossorigin="anonymous"></script>
{{ end }}
<style>
  :root {
    color-scheme: dark;
    background-color: #0e1220;
    color: #e8eef7;
  }

  html, body {
    background: #0e1220 !important;
    color: #e8eef7 !important;
  }

  a, a:visited {
    color: #7bb7ff !important;
  }

  body, p, li, dt, dd, blockquote, figcaption, table, th, td {
    color: #e8eef7 !important;
  }

  blockquote {
    background: rgba(255,255,255,0.03) !important;
    border-left: 0.35rem solid rgba(255,255,255,0.15) !important;
  }

  pre, code, .highlight, .chroma, .highlight pre, .chroma pre, code[class*="language-"], pre[class*="language-"] {
    background: #111827 !important;
    color: #e8eef7 !important;
    border-color: #2d3748 !important;
  }

  img, svg, video {
    filter: none !important;
  }
</style>
