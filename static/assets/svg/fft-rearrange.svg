      <circle cx="0" cy="50" r="10" stroke="black" stroke-width="3" fill="yellow" />
      <circle cx="0" cy="75" r="10" stroke="black" stroke-width="3" fill="violet" />
      <circle cx="0" cy="100" r="10" stroke="black" stroke-width="3" fill="orange" />
