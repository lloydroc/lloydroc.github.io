      <line x1="0" y1="150" x2="140" y2="80" style="stroke:currentColor;stroke-width:2" marker-end="url(#arrowhead_right)" />
      <line x1="0" y1="175" x2="140" y2="175" style="stroke:currentColor;stroke-width:2" marker-end="url(#arrowhead_right)" />
