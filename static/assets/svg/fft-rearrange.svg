<svg viewBox="0 0 290 210" xmlns="http://www.w3.org/2000/svg" style="color: var(--text, #f3f6fb);">
  <style>
  text { fill: currentColor; font-family: sans-serif; }
    .small {
      dominant-baseline: central;
      text-anchor: middle;
      font-size:10px;
    }
    .unix {
      fill: #386cb0;
    }
    .ipip {
      fill: red;
    }
    .eth {
      fill: #beaed4;
    }
    .switch {
      fill: #f0027f;
    }
    .arrow {
      stroke: currentColor;
      fill: black;
    }
    svg {
      background-color: #ffffff;
    }
  </style>

  <!--
    an array of {1, 2, 3, 4, 5, 6, 7, 8} will be
    rearranged to {1, 5, 3, 7, 2, 6, 4, 8}
  -->

  <defs>
    <marker id="arrowhead_right" markerWidth="10" markerHeight="10" refX="0" refY="2.5" orient="auto">
      <polygon class="arrow" points="0,0 5,2.5 0,5 0,0" />
    </marker>
  </defs>

  <g transform="translate(15,15)">
    <g transform="translate(0,5)">
      <text x="0" y="0">000b</text>
      <text x="0" y="25">001b</text>
      <text x="0" y="50">010b</text>
      <text x="0" y="75">011b</text>
      <text x="0" y="100">100b</text>
      <text x="0" y="125">101b</text>
      <text x="0" y="150">110b</text>
      <text x="0" y="175">111b</text>
    </g>
    <g transform="translate(235,5)">
