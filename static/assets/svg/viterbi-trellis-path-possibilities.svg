<svg viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="color: var(--text, #f3f6fb);">
<desc>A Trellis Diagram for a Viterbi Decoder</desc>
<style>
  text { fill: currentColor; font-family: sans-serif; }
.atrans {
  stroke: grey;
  stroke-width: 1;
  fill: black;
}
.ptrans {
  stroke: currentColor;
  stroke-width: 1;
  border-style: dotted;
  fill: black;
}
.point {
  stroke: grey;
  stroke-width: 0.5;
  fill: black;
}
.state-text {
  font-family: SFMono-Regular,Consolas,Liberation Mono,Menlo,Courier,monospace;
  font-size: 10px;
}
.state-trans {
  font-family: SFMono-Regular,Consolas,Liberation Mono,Menlo,Courier,monospace;
  font-size: 8px;
}
.time-text {
  font-family: SFMono-Regular,Consolas,Liberation Mono,Menlo,Courier,monospace;
  font-size: 8px;
}
</style>
  <defs>
    <g id="trellis-column">
      <circle cx="0" cy="0"  r="2" class="point"/>
      <circle cx="0" cy="25" r="2" class="point"/>
      <circle cx="0" cy="50" r="2" class="point"/>
      <circle cx="0" cy="75" r="2" class="point"/>
    </g>

    <marker id="arrowhead_right" markerWidth="5" markerHeight="5" refX="6.5" refY="2.5" orient="auto">
      <polygon points="0,0 5,2.5 0,5 0,0" />
    </marker>
  </defs>

  <g transform="translate(21,25)">

    <!-- arrows for state transitions -->
    <line x1=  "0" x2= "25" y1=  "0" y2= "25" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "25" x2= "50" y1= "25" y2= "50" class="atrans" marker-end="url(#arrowhead_right)"/>

    <line x1= "50" x2= "75" y1= "50" y2= "75" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "50" x2= "75" y1= "50" y2= "50" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>

    <line x1= "75" x2="100" y1= "50" y2= "50" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "75" x2="100" y1= "50" y2= "75" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "75" x2="100" y1= "75" y2= "25" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "75" x2="100" y1= "75" y2=  "0" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>

    <line x1= "100" x2="125" y1=  "0" y2=  "0" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "100" x2="125" y1=  "0" y2= "25" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "100" x2="125" y1= "25" y2= "50" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "100" x2="125" y1= "25" y2= "75" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "100" x2="125" y1= "50" y2= "50" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "100" x2="125" y1= "50" y2= "75" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "100" x2="125" y1= "75" y2= "25" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>
    <line x1= "100" x2="125" y1= "75" y2=  "0" stroke-dasharray="2,2" class="atrans" marker-end="url(#arrowhead_right)"/>

    <!-- states at the right -->
    <text x="-16" y="3" class="state-text">00</text>
    <text x="-16" y="28" class="state-text">10</text>
    <text x="-16" y="53" class="state-text">11</text>
    <text x="-16" y="78" class="state-text">01</text>

    <!-- time at the bottom -->
    <text x="-9" y="89" class="time-text">t=0</text>
    <text x="23" y="89" class="time-text">1</text>
    <text x="48" y="89" class="time-text">2</text>
    <text x="73" y="89" class="time-text">3</text>
    <text x="98" y="89" class="time-text">4</text>
    <text x="123" y="89" class="time-text">5</text>

    <!-- the grid of states -->
    <use transform="translate(  0,0)" xlink:href="#trellis-column"/>
    <use transform="translate( 25,0)" xlink:href="#trellis-column"/>
    <use transform="translate( 50,0)" xlink:href="#trellis-column"/>
    <use transform="translate( 75,0)" xlink:href="#trellis-column"/>
    <use transform="translate(100,0)" xlink:href="#trellis-column"/>
    <use transform="translate(125,0)" xlink:href="#trellis-column"/>
  </g>

</svg>
