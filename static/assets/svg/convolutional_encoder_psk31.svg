  <path d="M75 200 L 75 250 L 155 250"/>
  <path d="M275 200 L 275 250 L 195 250"/>
  <line x1="175" x2="175" y1="80" y2="60"/>
  <line x1="175" x2="175" y1="270" y2="290"/>

  <text x="170" y="255">&#931;</text>
  <text x="167" y="300">g1</text>
</svg>
