<svg viewBox="0 0 350 305" xmlns="http://www.w3.org/2000/svg" style="color: var(--text, #f3f6fb);">
  <desc>A Convolutional Encoder for PSK31</desc>
  <style>
  rect, line, path, circle, text {
    stroke: currentColor;
    fill: currentColor;
  }

  rect, circle {
    fill: rgba(255, 255, 255, 0.12);
    stroke-width: 1.25;
  }

  line, path {
    stroke-width: 1.25;
    fill: none;
  }

  text {
    fill: currentColor;
    font-family: sans-serif;
    font-size: 14px;
  }
  </style>

  <rect x="50" y="150" width="50" height="50"/>
  <rect x="100" y="150" width="50" height="50"/>
  <rect x="150" y="150" width="50" height="50"/>
  <rect x="200" y="150" width="50" height="50"/>
  <rect x="250" y="150" width="50" height="50"/>

  <circle cx="175" cy="100" r="20"/>
  <line x1="175" x2="175" y1="150" y2="120"/>
  <line x1="125" x2="160" y1="150" y2="112"/>
  <path d="M75 150 L 75 100 L 155 100"/>
  <path d="M275 150 L 275 100 L 195 100"/>
  <line x1="175" x2="175" y1="80" y2="60"/>

  <text x="70" y="180">x0</text>
  <text x="120" y="180">x1</text>
  <text x="170" y="180">x2</text>
  <text x="220" y="180">x3</text>
  <text x="270" y="180">x4</text>
  <text x="170" y="105">&#931;</text>
  <text x="167" y="55">g0</text>

  <!-- bottom sum -->
  <circle cx="175" cy="250" r="20"/>
