<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
  <style>
    .small {
      dominant-baseline: central;
      text-anchor: middle;
      font-size:10px;
    }
    .unix {
      fill: #386cb0;
    }
    .ipip {
      fill: red;
    }
    .eth {
      fill: #beaed4;
    }
    .switch {
      fill: #f0027f;
    }
    .arrow {
      stroke: white;
      fill: white;
    }
  </style>

  <!--
    an array of {1, 2, 3, 4, 5, 6, 7, 8} will be
    rearranged to {1, 5, 3, 7, 2, 6, 4, 8}
  -->

  <defs>
    <marker id="arrowhead_right" markerWidth="10" markerHeight="10" refX="0" refY="2.5" orient="auto">
      <polygon class="arrow" points="0,0 5,2.5 0,5 0,0" />
    </marker>
  </defs>

  <g transform="translate(20,15)">
    <g transform="translate(0,0)">
      <text x="0" y="15" fill="red" class="small">x[0]*h[0]</text>
      <text x="50" y="15" fill="red" class="small">x[0]*h[1]</text>
      <text x="100" y="15" fill="red" class="small">x[0]*h[2]</text>
      <text x="150" y="15" fill="red" class="small">x[0]*h[3]</text>
      <text x="200" y="15" fill="red" class="small">x[0]*h[4]</text>
      <text x="250" y="15" fill="red" class="small">x[0]*h[5]</text>
