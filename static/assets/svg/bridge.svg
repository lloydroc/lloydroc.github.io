<svg viewBox="0 0 310 230" xmlns="http://www.w3.org/2000/svg">
  <style>
    .small {
      dominant-baseline: central;
      text-anchor: middle;
      font-size:10px;
    }
    .unix {
      fill: #386cb0;
    }
    .veth {
      fill: #beaed4;
    }
    .eth {
      fill: #f0027f;
    }
    .bridge {
      fill: red;
    }
  </style>

  <g transform="translate(5,5)">
    <g transform="translate(0,0)">
      <rect width="300" height="200" class="unix"/>
      <text x="15" y="10" class="small">Unix</text>
    </g>

    <line x1="90" x2="90" y1="90" y2="30" stroke="black" />
    <line x1="210" x2="210" y1="90" y2="30" stroke="black" />

    <g transform="translate(50,50)">
      <rect width="80" height="40" class="veth"/>
      <text x="37" y="20" class="small">veth0</text>
    </g>

    <g transform="translate(170,50)">
      <rect width="80" height="40" class="veth"/>
      <text x="37" y="20" class="small">veth1</text>
    </g>

    <line x1="90" x2="90" y1="90" y2="120" stroke="black" />
    <line x1="210" x2="210" y1="90" y2="120" stroke="black" />


    <g transform="translate(50,120)">
      <rect width="200" height="40" class="bridge"/>
      <text x="100" y="20" class="small">bridge</text>
    </g>

    <line x1="150" x2="150" y1="160" y2="180" stroke="black" />

    <g transform="translate(110,180)">
      <rect width="80" height="40" class="eth"/>
      <text x="40" y="20" class="small">eth0</text>
    </g>
  </g>
</svg>
