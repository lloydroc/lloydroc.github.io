@startuml
binary  "Data Frame" as D

@0
D is 1

@10
D is 0

@20
D is 0
@30
D is 0
@40
D is 1
@50
D is 0
@60
D is 1
@70
D is 1
@80
D is 0
@90
D is 0

@100
D is 1

@110
D is 1

@120
D is 1

highlight 0 to 10 #FFDC73;line:DimGrey : Idle
highlight 10 to 20 #AC7C00;line:DimGrey : Start
highlight 20 to 100 #FFBF00;line:DimGrey : Data
highlight 100 to 110 #BF9B30;line:DimGrey : Parity
highlight 110 to 120 #AC7C00;line:DimGrey : Stop
highlight 120 to 130 #FFDC73;line:DimGrey : Idle
@enduml

