<svg viewBox="0 0 310 355" xmlns="http://www.w3.org/2000/svg">
  <style>
    .small {
      dominant-baseline: central;
      text-anchor: middle;
      font-size:10px;
    }
    .unix {
      fill: #386cb0;
    }
    .vlan {
      fill: red;
    }
    .eth {
      fill: #beaed4;
    }
    .switch {
      fill: #f0027f;
    }
  </style>

  <g transform="translate(5,5)">
    <g transform="translate(0,0)">
      <rect width="300" height="200" class="unix"/>
      <text x="15" y="10" class="small">Unix</text>
    </g>

    <text x="90" y="80" class="small">192.168.100.0/24</text>
    <text x="210" y="80" class="small">192.168.200.0/24</text>

    <line x1="90" x2="90" y1="90" y2="120" stroke="black" />
    <line x1="210" x2="210" y1="90" y2="120" stroke="black" />

    <g transform="translate(50,120)">
      <rect width="80" height="40" class="vlan"/>
      <text x="37" y="20" class="small">eth0.100</text>
    </g>

    <g transform="translate(170,120)">
      <rect width="80" height="40" class="vlan"/>
      <text x="37" y="20" class="small">eth0.200</text>
    </g>

    <line x1="90" x2="150" y1="160" y2="180" stroke="black" />
    <line x1="210" x2="150" y1="160" y2="180" stroke="black" />

    <g transform="translate(110,180)">
      <rect width="80" height="40" class="eth"/>
      <text x="40" y="20" class="small">eth0</text>
    </g>

    <g transform="translate(50,240)">
      <rect width="200" height="40" class="switch"/>
      <text x="100" y="20" class="small">switch</text>
    </g>

    <g fill="none" stroke="red" stroke-width="10">
      <path stroke-dasharray="3,3" d="M150 220 l0 20" />
    </g>
    <text x="210" y="230" class="small">trunking VLANs: 100, 200</text>

    <line x1="90" y1="280" x2="90" y2="300" stroke="black" />
    <line x1="210" y1="280" x2="210" y2="320" stroke="black" />

    <text x="90" y="310" class="small">VLAN 100, 192.168.100.0/24</text>
    <text x="210" y="330" class="small">VLAN 200, 192.168.200.0/24</text>
  </g>

</svg>
