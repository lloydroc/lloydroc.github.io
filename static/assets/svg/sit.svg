<svg viewBox="0 0 310 305" xmlns="http://www.w3.org/2000/svg">
  <style>
    .small {
      dominant-baseline: central;
      text-anchor: middle;
      font-size:10px;
    }
    .unix {
      fill: #386cb0;
    }
    .sit {
      fill: red;
    }
    .eth {
      fill: #beaed4;
    }
    .switch {
      fill: #f0027f;
    }
  </style>

  <g transform="translate(5,5)">
    <g transform="translate(0,0)">
      <rect width="300" height="200" class="unix"/>
      <text x="15" y="10" class="small">Unix</text>
    </g>

    <line x1="150" x2="150" y1="90" y2="120" stroke="black" />
    <text x="150" y="80" class="small">IPv6 Packets</text>

    <g transform="translate(110,120)">
      <rect width="80" height="40" class="bond"/>
      <text x="40" y="20" class="small">sit</text>
    </g>

    <line x1="150" y1="160" x2="150" y2="180" stroke="black" />
    <text x="190" y="170" class="small">IPv6 inside IPv4</text>

    <g transform="translate(110,180)">
      <rect width="80" height="40" class="eth"/>
      <text x="40" y="20" class="small">eth0</text>
    </g>

    <g transform="translate(110,240)">
      <rect width="80" height="40" class="switch"/>
      <text x="40" y="20" class="small">switch</text>
    </g>

    <line x1="150" y1="240" x2="150" y2="220" stroke="black" />
    <text x="190" y="230" class="small">IPv4 Packets</text>

  </g>

</svg>
