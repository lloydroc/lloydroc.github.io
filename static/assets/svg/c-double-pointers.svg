<svg viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg" style="color: var(--text, #f3f6fb);">
  <style>
  text { fill: currentColor; font-family: sans-serif; }
    .pointer {
      stroke: currentColor;
      fill: rgba(255, 255, 255, 0.12);
    }
    .arrow {
      stroke: white;
      fill: rgba(255, 255, 255, 0.12);
    }
  </style>

  <defs>
    <marker id="arrowhead_down" markerWidth="10" markerHeight="10" refX="2.5" refY="0">
      <polygon points="0,0 5,0 2.5,5 0,0" />
    </marker>
    <marker id="arrowhead_up" markerWidth="10" markerHeight="10" refX="2.5" refY="2.5">
      <polygon points="0,5 5,5 2.5,0 0,5" />
    </marker>
    <marker id="arrowhead_right" markerWidth="10" markerHeight="10" refX="0" refY="2.5" orient="auto">
      <polygon class="arrow" points="0,0 5,2.5 0,5 0,0" />
    </marker>
    <marker id="arrowhead_left" markerWidth="10" markerHeight="10" refX="5" refY="2.5">
      <polygon points="0,2.5 5,0 5,5 0,2.5" />
    </marker>
  </defs>

  <rect x="5"   y="50" width="50" height="30" class="pointer"/>
  <rect x="145" y="20" width="50" height="30" class="pointer"/>
  <rect x="265" y="65" width="50" height="30" class="pointer"/>

  <line x1="55"  y1="65" x2="140" y2="35" marker-end="url(#arrowhead_right)" class="arrow"/>
  <line x1="195" y1="35" x2="260" y2="80" marker-end="url(#arrowhead_right)" class="arrow"/>

  <text x="15"  y="70">**pp</text>
  <text x="160" y="40">*p</text>
  <text x="280" y="85">42</text>
</svg>
