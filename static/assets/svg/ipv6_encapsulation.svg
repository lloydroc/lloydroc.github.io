<svg viewBox="0 0 410 110" xmlns="http://www.w3.org/2000/svg">
  <style>
    .small {
      dominant-baseline: central;
      text-anchor: middle;
      font-size:10px;
    }
    .outer {
      fill: #386cb0;
    }
    .inner {
      fill: red;
    }
  </style>

  <g transform="translate(5,5)">
    <g transform="translate(0,50)">
      <rect width="100" height="40" class="outer"/>
      <text x="50" y="20" class="small">Outer IPv6 Header</text>
    </g>

    <g transform="translate(100,50)">
      <rect width="300" height="40" class="outer"/>
      <text x="150" y="20" class="small">Outer IPv6 Payload</text>
    </g>

    <g transform="translate(100,0)">
      <rect width="100" height="40" class="inner"/>
      <text x="50" y="20" class="small">Inner IPv4/v6 Header</text>
    </g>

    <g transform="translate(200,0)">
      <rect width="200" height="40" class="inner"/>
      <text x="100" y="20" class="small">Inner IPv4/IPv6 Payload</text>
    </g>

  </g>

</svg>
