<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" style="color: var(--text, #f3f6fb);">
  <rect x="150" y="10" width="75" height="60" style="stroke:currentColor; fill: rgba(255, 255, 255, 0.12);"/>

  <line x1="5"   y1="40" x2="150" y2="40" style="stroke:currentColor"/>
  <line x1="145" y1="45" x2="150" y2="40" style="stroke:currentColor"/>
  <line x1="145" y1="35" x2="150" y2="40" style="stroke:currentColor"/>

  <rect x="400"  y="10" width="75" height="60" style="stroke:currentColor; fill: rgba(255, 255, 255, 0.12);"/>
  <line x1="225" y1="40" x2="400" y2="40" style="stroke:currentColor"/>
  <line x1="395" y1="45" x2="400" y2="40" style="stroke:currentColor"/>
